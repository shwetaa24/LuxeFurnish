<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | LuxeFurnish</title>
    <meta name="description" content="Get in touch with LuxeFurnish for premium furniture inquiries and support.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="navbar" class="scrolled">
        <div class="logo">LuxeFurnish</div>
        <ul class="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="collections.html">Collections</a></li>

            <li><a href="contact.html">Contact</a></li>
            <li id="userAuthLink"><a href="user-login.html" style="color: var(--primary);">Login</a></li>
            <li><a href="login.html" class="btn btn-outline" style="padding: 8px 20px;">Admin</a></li>
        </ul>
    </nav>

    <section id="contact" style="background: var(--bg); padding-top: 150px; min-height: 80vh;">
        <div class="section-title">
            <h2>Get In Touch</h2>
            <div class="underline"></div>
            <p style="margin-top: 20px; color: var(--text-muted);">Have questions? We'd love to hear from you.</p>
        </div>

        <div style="max-width: 800px; margin: 0 auto;" class="glass">
            <form id="customerForm" style="padding: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group" style="grid-column: span 1;">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe" required>
                </div>
                <div class="form-group" style="grid-column: span 1;">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group" style="grid-column: span 1;">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
                </div>
                <div class="form-group" style="grid-column: span 1;">
                    <label>Address</label>
                    <input type="text" id="address" placeholder="123 Luxury Ave, NY" required>
                </div>
                <button type="submit" class="btn btn-primary" style="grid-column: span 2;">Send Inquiry</button>
            </form>
        </div>
    </section>

    <footer style="padding: 50px 10%; text-align: center; border-top: 1px solid var(--glass-border);">
        <div class="logo" style="margin-bottom: 20px;">LuxeFurnish</div>
        <p style="color: var(--text-muted); font-size: 0.9rem;">&copy; 2024 LuxeFurnish Interiors. All rights reserved.</p>
    </footer>

    <script>
        // Check if user is logged in to update navigation
        const user = localStorage.getItem('adminUser');
        if(user) {
            const adminLink = document.querySelector('a[href="login.html"]');
            if(adminLink) {
                adminLink.textContent = 'Admin';
                adminLink.href = 'admin.html';
            }
        }

        // Check if regular user is logged in
        const currentUser = localStorage.getItem('currentUser');
        if(currentUser) {
            const userAuthLink = document.getElementById('userAuthLink');
            if(userAuthLink) {
                userAuthLink.innerHTML = `<span style="color: var(--primary);"><i class="fas fa-user"></i> ${currentUser}</span>`;
                userAuthLink.style.cursor = 'pointer';
                userAuthLink.onclick = () => {
                    if(confirm('Do you want to logout?')) {
                        localStorage.removeItem('currentUser');
                        location.reload();
                    }
                };
            }
        }

        // Customer Inquiry Submission
        document.getElementById('customerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const customer = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };

            try {
                const response = await fetch('/api/customers', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(customer)
                });
                if(response.ok) {
                    alert('Inquiry sent successfully! Our team will contact you soon.');
                    e.target.reset();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
