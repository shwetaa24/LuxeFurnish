name: Unified CI/CD Pipeline (AWS & GitHub)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  AWS_REGION: us-east-1 # Change this to your preferred region

jobs:
  # --- BACKEND & DOCKER JOBS ---
  build-and-push:
    name: "🏗️ Build & Push Docker"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-backend:latest
            ${{ env.REGISTRY }}/${{ github.repository }}-backend:${{ github.sha }}

  # --- FRONTEND DEPLOYMENT ---
  frontend-deploy:
    name: "🚀 Frontend: Deploy to Pages"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # --- AWS DEPLOYMENT (PLACEHOLDER) ---
  aws-deploy:
    name: "☁️ AWS: Deploy to App Runner"
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: "Status"
        run: echo "Ready for AWS Deployment. Please add AWS credentials to secrets."
